# .github/workflows/hugo.yaml
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main  # 当代码推送到 main 分支时触发工作流

  workflow_dispatch: # 允许手动触发工作流

# 设置 GitHub Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个并发部署任务
concurrency:
  group: "pages"
  cancel-in-progress: false

# 定义工作流程中的任务
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 获取 Git 子模块（你的主题）
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true  # 如果你使用 Sass/SCSS，需要设置为 true

      - name: Build
        run: hugo --minify  # 生成生产环境下的静态网站到 public/ 目录

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # 指定要上传的目录

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4